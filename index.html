<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO 浚研系統 | 電子名片</title>
  <meta name="description" content="RIVO 浚研系統股份有限公司 - AI-Native Fleet Control Platform">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background: #f5f5f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 60px 60px; z-index: 0;
    }
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      gap: 40px; padding: 40px 20px;
    }
    .logo {
      font-size: 42px; font-weight: 800; letter-spacing: -1px;
      color: #1a1a1a;
    }
    .logo span {
      display: block; font-size: 13px; font-weight: 400;
      color: #6b7280; letter-spacing: 2px; margin-top: 4px; text-align: center;
    }
    .cards {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
    }
    .person-card {
      background: #1a1a1a; color: #f0f0f5;
      border-radius: 16px; padding: 32px 36px;
      text-decoration: none; width: 260px;
      transition: all 0.3s ease;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .person-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 48px rgba(0,0,0,0.15);
    }
    .avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700;
    }
    .person-name {
      font-size: 20px; font-weight: 700; text-align: center;
    }
    .person-name span {
      display: block; font-size: 12px; font-weight: 400;
      color: #9ca3af; margin-top: 2px;
    }
    .person-title {
      font-size: 13px; color: #9ca3af;
      padding: 4px 14px; border-radius: 100px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .arrow {
      font-size: 13px; color: #6b7280;
      display: flex; align-items: center; gap: 4px;
      transition: color 0.2s;
    }
    .person-card:hover .arrow { color: #fff; }
    .footer {
      font-size: 12px; color: #9ca3af; text-align: center;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="container">
    <div class="logo">
      RIVO
      <span>浚研系統股份有限公司</span>
    </div>
    <div class="cards">
      <a href="pingyi/" class="person-card">
        <div class="avatar">秉</div>
        <div class="person-name">周秉毅<span>Ping-Yi, Chou</span></div>
        <div class="person-title">執行長 CEO</div>
        <div class="arrow">查看名片 &rarr;</div>
      </a>
      <a href="jianlun/" class="person-card">
        <div class="avatar">綸</div>
        <div class="person-name">李建綸<span>Jian-Lun, Li</span></div>
        <div class="person-title">技術長 CTO</div>
        <div class="arrow">查看名片 &rarr;</div>
      </a>
    </div>
    <div class="footer">AI-Native Fleet Control Platform</div>
  </div>
</body>
</html>
