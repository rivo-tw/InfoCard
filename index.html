<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO - Ping-Yi Chou | Digital Business Card</title>
  <meta name="description" content="RIVO 波研系統 - 周秉毅 執行長 | AI-Native Fleet Control Platform">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --accent: #1a1a1a;
      --accent-glow: rgba(0, 0, 0, 0.08);
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
    }

    body {
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    /* === Animated background === */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }
    .bg-glow.one { background: #d1d5db; top: -200px; left: -100px; }
    .bg-glow.two { background: #e5e7eb; bottom: -200px; right: -100px; }

    /* === Scene === */
    .scene-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
      width: 100%;
      padding: 20px;
      padding-bottom: 0;
    }

    .scene {
      width: min(520px, 92vw);
      height: min(293px, calc(92vw * 0.5634));
      perspective: 1200px;
      cursor: grab;
    }
    .scene:active { cursor: grabbing; }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.06),
        0 25px 60px rgba(0,0,0,0.12),
        0 8px 24px rgba(0,0,0,0.08);
    }

    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-front { z-index: 2; }
    .card-back { transform: rotateY(180deg); }

    /* === Shine overlay === */
    .card-shine {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      pointer-events: none;
      z-index: 10;
      background: radial-gradient(
        circle at var(--shine-x, 50%) var(--shine-y, 50%),
        rgba(255,255,255,0.15) 0%,
        transparent 60%
      );
    }

    /* === Hint === */
    .hint {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      letter-spacing: 0.5px;
      animation: fadeInUp 1s ease 0.5s both;
    }
    .hint svg { animation: swipe 2s ease-in-out infinite; }
    @keyframes swipe {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(8px); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Contact panel === */
    .contact-panel {
      z-index: 1;
      width: 100%;
      background: #1a1a1a;
      color: #f0f0f5;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-radius: 0;
      padding: 20px 24px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      animation: fadeInUp 0.8s ease 0.3s both;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0;
    }
    .contact-inner {
      width: min(520px, 100%);
    }

    .contact-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .contact-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .contact-name span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      color: #9ca3af;
      margin-top: 2px;
    }

    .contact-title {
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: #f0f0f5;
    }
    .contact-title span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: #9ca3af;
    }

    .company-line {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 0.3px;
    }

    .contact-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #f0f0f5;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 10px;
      transition: background 0.2s, color 0.2s;
    }
    .contact-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
    }

    .contact-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .contact-icon svg {
      width: 16px;
      height: 16px;
      stroke: #f0f0f5;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-item-text {
      display: flex;
      flex-direction: column;
    }
    .contact-item-label {
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* === Actions === */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-decoration: none;
    }

    .btn-primary {
      background: #ffffff;
      color: #1a1a1a;
    }
    .btn-primary:hover {
      background: #e5e5e5;
      box-shadow: 0 4px 16px rgba(255,255,255,0.1);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #f0f0f5;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.15);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* === Toast === */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      border: 1px solid rgba(0,0,0,0.1);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* === Responsive === */
    @media (max-width: 560px) {
      .scene-wrapper { padding: 16px; }
      .scene { width: 92vw; height: calc(92vw * 0.5634); }
      .contact-panel { padding: 14px 16px; }
      .contact-inner { width: 100%; }
      .contact-header { margin-bottom: 10px; }
      .contact-name { font-size: 15px; }
      .contact-name span { font-size: 11px; }
      .contact-title { font-size: 12px; }
      .contact-title span { font-size: 10px; }
      .company-line { font-size: 10px; margin-bottom: 8px; padding-bottom: 8px; }
      .contact-grid { gap: 2px; }
      .contact-item { font-size: 12px; padding: 4px 6px; gap: 8px; }
      .contact-icon { width: 26px; height: 26px; }
      .contact-icon svg { width: 13px; height: 13px; }
      .contact-item-label { font-size: 9px; }
      .actions { gap: 8px; margin-top: 10px; }
      .btn { padding: 8px 10px; font-size: 12px; }
      .btn svg { width: 14px; height: 14px; }
      .hint { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <div class="scene-wrapper">
    <!-- 3D Card -->
    <div>
      <div class="scene" id="scene">
        <div class="card" id="card">
          <div class="card-face card-front">
            <img src="assets/card-front.png" alt="RIVO Business Card Front" draggable="false">
            <div class="card-shine" id="shineFront"></div>
          </div>
          <div class="card-face card-back">
            <img src="assets/card-back.png" alt="RIVO Business Card Back" draggable="false">
            <div class="card-shine" id="shineBack"></div>
          </div>
        </div>
      </div>
      <div class="hint">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
        拖曳旋轉 &middot; 雙擊翻面
      </div>
    </div>

  </div>

  <!-- Contact Info -->
  <div class="contact-panel">
    <div class="contact-inner">
      <div class="contact-header">
        <div class="contact-name">
          周秉毅
          <span>Ping-Yi Chou</span>
        </div>
        <div class="contact-title">
          執行長
          <span>CEO</span>
        </div>
      </div>

      <div class="company-line">RIVO 浚研科技股份有限公司 &mdash; AI-Native Fleet Control Platform</div>

      <div class="contact-grid">
        <a href="mailto:rivo@rivo.com.tw" class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <div class="contact-item-text">
            <span class="contact-item-label">電子郵件</span>
            rivo@rivo.com.tw
          </div>
        </a>
        <a href="tel:0972726560" class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div class="contact-item-text">
            <span class="contact-item-label">電話</span>
            0972-726-560
          </div>
        </a>
        <a href="https://rivo.com.tw" target="_blank" rel="noopener" class="contact-item">
          <div class="contact-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          </div>
          <div class="contact-item-text">
            <span class="contact-item-label">網站</span>
            rivo.com.tw
          </div>
        </a>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="downloadVCard()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          儲存聯絡人
        </button>
        <button class="btn btn-secondary" onclick="shareCard()">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          分享
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const scene = document.getElementById('scene');
    const card = document.getElementById('card');
    const shineFront = document.getElementById('shineFront');
    const shineBack = document.getElementById('shineBack');

    let isDragging = false;
    let startX, startY;
    let rotateX = 0, rotateY = 0;
    let currentX = 0, currentY = 0;
    let targetX = 0, targetY = 0;
    let autoRotate = true;
    let autoAngle = 0;
    let lastInteraction = 0;

    // --- Drag rotation ---
    scene.addEventListener('mousedown', (e) => {
      isDragging = true;
      autoRotate = false;
      startX = e.clientX;
      startY = e.clientY;
      lastInteraction = Date.now();
    });

    scene.addEventListener('touchstart', (e) => {
      isDragging = true;
      autoRotate = false;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      lastInteraction = Date.now();
    }, { passive: true });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      targetY = rotateY + dx * 0.5;
      targetX = rotateX - dy * 0.3;
      targetX = Math.max(-30, Math.min(30, targetX));

      // Shine effect
      const rect = scene.getBoundingClientRect();
      const px = ((e.clientX - rect.left) / rect.width) * 100;
      const py = ((e.clientY - rect.top) / rect.height) * 100;
      shineFront.style.setProperty('--shine-x', px + '%');
      shineFront.style.setProperty('--shine-y', py + '%');
      shineBack.style.setProperty('--shine-x', (100 - px) + '%');
      shineBack.style.setProperty('--shine-y', py + '%');
    });

    window.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      targetY = rotateY + dx * 0.5;
      targetX = rotateX - dy * 0.3;
      targetX = Math.max(-30, Math.min(30, targetX));
    }, { passive: true });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        rotateX = targetX;
        rotateY = targetY;
      }
      isDragging = false;
    });

    window.addEventListener('touchend', () => {
      if (isDragging) {
        rotateX = targetX;
        rotateY = targetY;
      }
      isDragging = false;
    });

    // --- Double-click flip ---
    scene.addEventListener('dblclick', () => {
      autoRotate = false;
      lastInteraction = Date.now();
      rotateY += 180;
      targetY = rotateY;
      targetX = 0;
      rotateX = 0;
    });

    // --- Animation loop ---
    function animate() {
      // Resume auto-rotate after 5s idle
      if (!isDragging && Date.now() - lastInteraction > 5000) {
        autoRotate = true;
      }

      if (autoRotate && !isDragging) {
        autoAngle += 0.15;
        targetY = autoAngle;
        targetX = Math.sin(autoAngle * 0.01) * 5;
        rotateX = targetX;
        rotateY = targetY;
      }

      currentX += (targetX - currentX) * 0.08;
      currentY += (targetY - currentY) * 0.08;

      card.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
      requestAnimationFrame(animate);
    }
    animate();

    // --- Hover shine (non-drag) ---
    scene.addEventListener('mousemove', (e) => {
      if (isDragging) return;
      const rect = scene.getBoundingClientRect();
      const px = ((e.clientX - rect.left) / rect.width) * 100;
      const py = ((e.clientY - rect.top) / rect.height) * 100;
      shineFront.style.setProperty('--shine-x', px + '%');
      shineFront.style.setProperty('--shine-y', py + '%');
      shineBack.style.setProperty('--shine-x', (100 - px) + '%');
      shineBack.style.setProperty('--shine-y', py + '%');
    });

    // --- vCard download ---
    function downloadVCard() {
      const vcard = `BEGIN:VCARD
VERSION:3.0
N:Chou;Ping-Yi;;;
FN:周秉毅 Ping-Yi Chou
ORG:RIVO 浚研科技股份有限公司
TITLE:CEO 執行長
TEL;TYPE=CELL:0972-726-560
EMAIL:rivo@rivo.com.tw
URL:https://rivo.com.tw
NOTE:AI-Native Fleet Control Platform - Make Robots Meet the AI Cloud
END:VCARD`;

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'PingYi_Chou_RIVO.vcf';
      a.click();
      URL.revokeObjectURL(url);
      showToast('聯絡人檔案已下載！');
    }

    // --- Share ---
    async function shareCard() {
      const shareData = {
        title: 'RIVO - Ping-Yi Chou',
        text: '周秉毅 | CEO @ RIVO 波研系統 - AI-Native Fleet Control Platform',
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (e) {
          if (e.name !== 'AbortError') copyLink();
        }
      } else {
        copyLink();
      }
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        showToast('連結已複製！');
      }).catch(() => {
        showToast('請複製網址分享此名片');
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
